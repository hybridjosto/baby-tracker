<div class="nappy-backdrop" id="nappy-backdrop" aria-hidden="true"></div>
<div class="misc-backdrop" id="misc-backdrop" aria-hidden="true"></div>
<div class="feed-backdrop" id="feed-backdrop" aria-hidden="true"></div>
<div class="bottom-bar">
  <div class="last-activity">
    <span class="material-symbols-outlined" style="font-size: 16px;">schedule</span>
    <span class="skeleton-text skeleton-wide" id="last-activity">Last activity: --</span>
  </div>
  <div class="action-grid action-grid--three">
    <div class="nappy-wrap">
      <button class="action-btn" id="log-nappy" type="button" aria-expanded="false">
        <span class="material-symbols-outlined" style="color: #7dd3fc;">baby_changing_station</span>
        Nappy
      </button>
      <div class="nappy-menu" id="nappy-menu" aria-hidden="true">
        <button class="nappy-option" id="log-wee" type="button">
          <span class="material-symbols-outlined" style="color: #7dd3fc;">rainy</span>
          Wee
        </button>
        <button class="nappy-option" id="log-poo" type="button">
          <span class="material-symbols-outlined" style="color: #fbbf24;">spa</span>
          Poo
        </button>
      </div>
    </div>
    <div class="misc-wrap">
      <button class="action-btn" id="log-misc" type="button" aria-expanded="false">
        <span class="material-symbols-outlined" style="color: #8b5cf6;">dashboard</span>
        Misc
      </button>
      <div class="misc-menu" id="misc-menu" aria-hidden="true"></div>
    </div>
    <div class="feed-wrap">
      <button class="action-btn primary" id="log-feed" type="button" aria-expanded="false">
        <span class="material-symbols-outlined" style="color: var(--primary); font-size: 30px;">water_drop</span>
        Feed
      </button>
    </div>
  </div>
</div>
<div class="feed-menu" id="feed-menu" aria-hidden="true">
  <div class="feed-quick">
    <div class="feed-toggle" role="group" aria-label="Quick log type">
      <button class="feed-toggle-btn is-active" id="feed-toggle-formula" type="button" data-kind="formula">Formula</button>
      <button class="feed-toggle-btn" id="feed-toggle-expressed" type="button" data-kind="expressed">Expressed</button>
    </div>
    <div class="feed-quick-row" role="group" aria-label="Quick log volume">
      <button class="feed-quick-btn" type="button" data-quick-size="small">Small</button>
      <button class="feed-quick-btn" type="button" data-quick-size="big">Big</button>
      <button class="feed-quick-btn" id="feed-manual-toggle" type="button">Manual</button>
    </div>
  </div>
  <div class="feed-manual" id="feed-manual" hidden>
    <div class="feed-input">
      <label for="formula-ml">Formula (ml)</label>
      <div class="feed-input-row">
        <input
          class="feed-input-field"
          id="formula-ml"
          type="number"
          min="0"
          step="0.1"
          inputmode="decimal"
          pattern="[0-9]*[.,]?[0-9]*"
          placeholder="0"
        >
        <button class="feed-option" id="log-formula" type="button">Log</button>
      </div>
    </div>
  </div>
</div>
<div class="log-footer-spacer" aria-hidden="true"></div>
