<section
  class="active-timer-banner breastfeed-banner"
  id="breastfeed-banner"
  role="status"
  aria-live="polite"
>
  <div class="banner-left">
    <div class="banner-title">
      <span class="pulse-dot" aria-hidden="true"></span>
      Breastfeeding active
    </div>
    <div class="banner-meta" id="breastfeed-banner-meta">Started by --</div>
  </div>
  <div class="banner-timer" id="breastfeed-banner-timer">-- min</div>
  <button class="banner-action" id="breastfeed-banner-action" type="button">
    End breastfeeding
  </button>
</section>
<section
  class="active-timer-banner breastfeed-banner timed-event-banner"
  id="timed-event-banner"
  role="status"
  aria-live="polite"
>
  <div class="banner-left">
    <div class="banner-title">
      <span class="pulse-dot" aria-hidden="true"></span>
      <span id="timed-event-banner-title">Timed event active</span>
    </div>
    <div class="banner-meta" id="timed-event-banner-meta">Started by --</div>
  </div>
  <div class="banner-timer" id="timed-event-banner-timer">-- min</div>
  <button class="banner-action" id="timed-event-banner-action" type="button">
    End timed event
  </button>
</section>
